<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porcentaje diario</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Gothic&family=Uncial+Antiqua&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    .contenedor {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    #porcentaje {
      font-size: 6rem;
      font-weight: bold;
    }

    #countdown {
      font-size: 2rem;
      opacity: 0.9;
    }

    #firma {
      margin-top: 10px;
      font-size: 2.5rem;
      color: #ff8dc7;
      font-family: "League Gothic", sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 141, 199, 0.4);
    }
  </style>
</head>

<body>

  <div class="contenedor">
    <div id="porcentaje">0%</div>

    <div id="countdown">00d 00h 00m 00s</div>

    <div id="firma">te amo muy en grande</div>
    <div id="firma">te amo muy en grande🩷</div>
  </div>

  <script>
    const porcentajes = {
      1: "70.5%",
      2: "71.6%",
      3: "72.7%",
      4: "73.9%",
      5: "75.0%",
      6: "76.1%",
      7: "77.3%",
      8: "78.4%",
      9: "79.5%",
      10: "80.7%",
      11: "81.8%",
      12: "83.0%",
      13: "84.1%",
      14: "85.2%",
      15: "86.4%",
      16: "87.5%",
      17: "88.6%",
      18: "89.8%",
      19: "90.9%",
      20: "92.0%",
      21: "93.2%",
      22: "94.3%",
      23: "95.5%",
      24: "96.6%",
      25: "97.7%",
      26: "98.9%",
      27: "100%"
    };

    const hoy = new Date();
    const dia = hoy.getDate();
    const mes = hoy.getMonth() + 1;

    let valor = "Sin datos";

    if (mes === 5 && porcentajes[dia]) {
      valor = porcentajes[dia];
    }

    document.getElementById("porcentaje").textContent = valor;

    function actualizarCountdown() {
      const ahora = new Date();

      const objetivo = new Date(
        ahora.getFullYear(),
        4,
        27,
        0,
        0,
        0
      );

      const diferencia = objetivo - ahora;

      if (diferencia <= 0) {
        document.getElementById("countdown").textContent =
          "te amo";
        return;
      }

      const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
      const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
      const minutos = Math.floor((diferencia / (1000 * 60)) % 60);
      const segundos = Math.floor((diferencia / 1000) % 60);

      document.getElementById("countdown").textContent =
        `${dias}d ${horas}h ${minutos}m ${segundos}s`;
    }

    actualizarCountdown();
    setInterval(actualizarCountdown, 1000);
  </script>

</body>
</html>
